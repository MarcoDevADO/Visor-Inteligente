<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clasificación de Limones</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body { 
            font-family: Arial, sans-serif; 
            background: #0d1117; 
            color: white;
            padding: 0;
            margin: 0;
        }

        .container { 
            display: flex; 
            flex-direction: row;
            min-height: 100vh;
            gap: 10px;
            padding: 10px;
        }

        .left {
            flex: 1; 
            background: #161b22; 
            padding: 20px;
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            border-radius: 10px;
            min-width: 0;
        }

        .left h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        #chart {
            width: 100%;
            max-width: 400px;
            height: auto;
        }

        .chart-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .chart-container h1 {
            text-align: center;
            font-size: 1.8rem;
            margin: 0;
        }

        .right {
            flex: 1; 
            display: flex;
            justify-content: center; 
            align-items: center;
            background: #0d1117;
            border-radius: 10px;
            min-width: 0;
        }

        #camera {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: 3px solid #58a6ff; 
            border-radius: 10px;
            max-width: 100%;
        }

        /* Tablet (hasta 768px) */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                gap: 15px;
                padding: 15px;
                min-height: auto;
            }

            .left {
                padding: 15px;
                min-height: 300px;
            }

            .chart-container h1 {
                font-size: 1.5rem;
            }

            .right {
                min-height: 400px;
            }

            #chart {
                max-width: 100%;
                max-height: 300px;
            }
        }

        /* Móviles (hasta 480px) */
        @media (max-width: 480px) {
            .container {
                flex-direction: column;
                gap: 10px;
                padding: 10px;
            }

            .left {
                padding: 10px;
                min-height: 250px;
            }

            .chart-container h1 {
                font-size: 1.2rem;
                margin-bottom: 15px;
            }

            .right {
                min-height: 300px;
            }

            #chart {
                max-width: 100%;
                max-height: 250px;
            }

            #camera {
                border-width: 2px;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="left">
        <img id="camera" src="/camera" alt="Cámara en vivo">
    </div>

    <div class="right">
        <div class="chart-container">
            <h1>Lote: <span id="lote">---</span></h1>
            <canvas id="chart"></canvas>
        </div>
    </div>

</div>

<script>
    var ctx = document.getElementById('chart').getContext('2d');

    var chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Buenos', 'Malos'],
            datasets: [{
                label: '',
                data: [0, 0],
                backgroundColor: ['#28a745', '#dc3545'],
                borderColor: ['#1e7e34', '#bd2130'],
                borderWidth: 2
            }]
        },
        options: { 
            plugins: {
                legend: {
                    display: false
                }
            },
            scales: { 
                y: { 
                    beginAtZero: true,
                    ticks: {
                        stepSize: 1
                    },
                    max: 5
                } 
            }
        }
    });

    // ESCUCHA SOLO CUANDO EL SERVIDOR ENVÍA DATOS
    var evtSource = new EventSource("/stream_actualizaciones");

    evtSource.onmessage = function(event) {
        const data = JSON.parse(event.data);

        // Si el evento es de cámara iniciada → recargar la imagen
        if (data.evento === "camara_iniciada") {
            console.log("Cámara iniciada, recargando vista web...");
            
            // Forzar recarga de la cámara
            const cam = document.getElementById("camera");
            cam.src = "/camera?ts=" + new Date().getTime();  // evitar cache

            return;
        }

        // Actualizar el número de lote si viene en los datos
        if (data.lote !== undefined) {
            document.getElementById("lote").textContent = data.lote;
        }

        // Si son datos del gráfico
        if (data.validos !== undefined && data.no_validos !== undefined) {
            chart.data.datasets[0].data = [
                data.validos,
                data.no_validos
            ];
            const maxValue = Math.max(data.validos, data.no_validos);
            chart.options.scales.y.max = maxValue + 5;
            chart.update();
        }
    };

</script>
</body>
</html>
